<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buyer Signup Details - AdminHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/svg+xml" href="../public/favicon.svg">
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/guard.js"></script>
    <script src="js/layout.js"></script>
</head>

<body data-route="buyer-signup-detail">
    <div id="layout-root"></div>
    <div id="main-content" class="main-content">
        <main class="page-container">
            <div class="d-flex flex-column flex-md-row align-items-center justify-content-between mb-4 gap-3">
                <div class="d-flex align-items-center gap-3">
                    <button class="btn btn-sm btn-outline-secondary" id="backBtn"><i class="bi bi-arrow-left me-1"></i>
                        Back</button>
                    <h1 class="h3 mb-0">Buyer Signup Details</h1>
                </div>
                <div class="d-flex gap-2">
                    <button class="btn btn-primary" id="toggleStatusBtn">Activate Buyer</button>
                </div>
            </div>
            <div id="loadingState" class="text-center py-5">
                <div class="spinner-border text-primary"></div>
                <p class="mt-3 text-muted">Loading...</p>
            </div>
            <div id="errorState" class="text-center py-5 d-none"><i
                    class="bi bi-exclamation-triangle text-danger display-4"></i>
                <p class="mt-3 text-danger" id="errorMessage"></p><button class="btn btn-outline-primary"
                    id="retryBtn">Try Again</button>
            </div>
            <div id="signupDetail" class="d-none">
                <div class="row g-3 mb-4">
                    <div class="col-12">
                        <div class="card" id="statusCard"></div>
                    </div>
                </div>
                <div class="row g-4">
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-header">
                                <h5 class="card-title mb-0 d-flex align-items-center gap-2"><i class="bi bi-person"></i>
                                    Personal Information</h5>
                            </div>
                            <div class="card-body">
                                <div class="mb-3"><label class="text-muted small">Full Name</label>
                                    <p class="mb-0" id="fullNameDisplay">--</p>
                                </div>
                                <div class="mb-3"><label class="text-muted small">Email Address</label>
                                    <div class="d-flex align-items-center gap-2"><i
                                            class="bi bi-envelope text-muted small"></i>
                                        <p class="mb-0" id="emailDisplay">--</p>
                                    </div>
                                </div>
                                <div class="mb-3"><label class="text-muted small">Phone Number</label>
                                    <div class="d-flex align-items-center gap-2"><i
                                            class="bi bi-telephone text-muted small"></i>
                                        <p class="mb-0" id="phoneDisplay">--</p>
                                    </div>
                                </div>
                                <div class="mb-3"><label class="text-muted small">Buyer ID</label>
                                    <p class="mb-0 font-monospace" id="buyerIdDisplay">--</p>
                                </div>
                                <div id="addressSection" class="mb-3"><label class="text-muted small">Address</label>
                                    <div class="d-flex align-items-start gap-2"><i
                                            class="bi bi-geo-alt text-muted small"></i>
                                        <p class="mb-0" id="addressDisplay">--</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-header">
                                <h5 class="card-title mb-0">Timeline</h5>
                            </div>
                            <div class="card-body">
                                <div class="row g-3">
                                    <div class="col-md-6"><label class="text-muted small">Registered on</label>
                                        <p class="mb-0" id="createdAtDisplay">--</p>
                                    </div>
                                    <div class="col-md-6"><label class="text-muted small">Last Updated</label>
                                        <p class="mb-0" id="updatedAtDisplay">--</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/mock-data.js"></script>
    <script src="js/api.js"></script>
    <script src="js/notifications.js"></script>
    <script src="js/app.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Details - AdminHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/svg+xml" href="../public/favicon.svg">
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/guard.js"></script>
    <script src="js/layout.js"></script>
</head>

<body data-route="contact-detail">
    <div id="layout-root"></div>
    <div id="main-content" class="main-content">
        <main class="page-container">
            <div class="d-flex align-items-center gap-3 mb-4">
                <button class="btn btn-sm btn-outline-secondary" id="backBtn"><i class="bi bi-arrow-left me-1"></i> Back
                    to Contacts</button>
                <h1 class="h3 mb-0">Contact Details</h1>
            </div>
            <div id="loadingState" class="text-center py-5">
                <div class="spinner-border text-primary"></div>
                <p class="mt-3 text-muted">Loading...</p>
            </div>
            <div id="errorState" class="text-center py-5 d-none"><i
                    class="bi bi-exclamation-triangle text-danger display-4"></i>
                <p class="mt-3 text-danger" id="errorMessage"></p><button class="btn btn-outline-primary"
                    id="retryBtn">Try Again</button>
            </div>
            <div id="contactDetail" class="d-none">
                <div class="row g-4">
                    <div class="col-md-8">
                        <div class="card">
                            <div class="card-header">
                                <h5 class="card-title mb-0 d-flex align-items-center gap-2"><i
                                        class="bi bi-chat-square"></i> Message</h5>
                                <p class="text-muted small mb-0" id="subjectDisplay">--</p>
                            </div>
                            <div class="card-body">
                                <p class="mb-0" style="white-space: pre-wrap;" id="messageDisplay">--</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card mb-4">
                            <div class="card-header">
                                <h5 class="card-title mb-0 d-flex align-items-center gap-2"><i class="bi bi-person"></i>
                                    Contact Information</h5>
                            </div>
                            <div class="card-body">
                                <div class="mb-3"><label class="text-muted small">Full Name</label>
                                    <p class="mb-0 fw-bold" id="fullNameDisplay">--</p>
                                </div>
                                <div><label class="text-muted small">Email</label>
                                    <div class="d-flex align-items-center gap-2"><i
                                            class="bi bi-envelope text-muted small"></i><a href="#" class="text-primary"
                                            id="emailDisplay">--</a></div>
                                </div>
                            </div>
                        </div>
                        <div class="card">
                            <div class="card-header">
                                <h5 class="card-title mb-0 d-flex align-items-center gap-2"><i
                                        class="bi bi-calendar"></i> Timeline</h5>
                            </div>
                            <div class="card-body">
                                <div class="mb-3"><label class="text-muted small">Submitted</label>
                                    <p class="mb-0 fw-bold" id="submittedDateDisplay">--</p>
                                </div>
                                <div><label class="text-muted small">Last Updated</label>
                                    <p class="mb-0 fw-bold" id="updatedDateDisplay">--</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/mock-data.js"></script>
    <script src="js/api.js"></script>
    <script src="js/notifications.js"></script>
    <script src="js/app.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacts - AdminHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/svg+xml" href="../public/favicon.svg">
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/guard.js"></script>
    <script src="js/layout.js"></script>
</head>

<body data-route="contacts">
    <!-- Shared layout will inject sidebar and top navbar here -->
    <div id="layout-root"></div>

    <!-- Main Content -->
    <div id="main-content" class="main-content">
        <!-- Page Content -->
        <main class="page-container">
            <div class="d-flex align-items-center justify-content-between mb-4">
                <h1 class="h3 mb-0">Contacts</h1>
                <div class="d-flex align-items-center gap-3">
                    <span class="text-muted small" id="totalContacts">0 total contacts</span>
                    <button class="btn btn-outline-primary" id="exportBtn">
                        <i class="bi bi-download"></i> Export CSV
                    </button>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h5 class="card-title mb-0">Contact Submissions</h5>
                    <p class="text-muted small mb-0">Messages and inquiries from your website visitors</p>
                </div>
                <div class="card-body">
                    <!-- Loading state -->
                    <div id="loadingState" class="text-center py-5">
                        <div class="spinner-border text-primary" role="status"></div>
                        <p class="mt-3 text-muted">Loading contacts...</p>
                    </div>

                    <!-- Error state -->
                    <div id="errorState" class="text-center py-5 d-none">
                        <i class="bi bi-exclamation-triangle text-danger display-4"></i>
                        <p class="mt-3 text-danger" id="errorMessage"></p>
                        <button class="btn btn-outline-primary" id="retryBtn">Try Again</button>
                    </div>

                    <!-- Empty state -->
                    <div id="emptyState" class="text-center py-5 d-none">
                        <i class="bi bi-inbox display-4 text-muted"></i>
                        <p class="mt-3 text-muted">No contacts found</p>
                        <button class="btn btn-outline-primary" id="refreshBtn">Refresh</button>
                    </div>

                    <!-- Contacts list -->
                    <div id="contactsList" class="d-none">
                        <div id="contactsContainer"></div>

                        <!-- Pagination -->
                        <div class="d-flex align-items-center justify-content-between mt-4 pt-3 border-top">
                            <span class="text-muted small" id="paginationInfo"></span>
                            <div class="btn-group" id="paginationControls"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/mock-data.js"></script>
    <script src="js/api.js"></script>
    <script src="js/notifications.js"></script>
    <script src="js/app.js"></script>
</body>

</html>

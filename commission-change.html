<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commission Change - AdminHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/svg+xml" href="../public/favicon.svg">
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/guard.js"></script>
    <script src="js/layout.js"></script>
</head>

<body data-route="commission-change">
    <!-- Shared layout will inject sidebar and top navbar here -->
    <div id="layout-root"></div>

    <!-- Main Content -->
    <div id="main-content" class="main-content">
        <!-- Page Content -->
        <main class="page-container">
            <h1 class="h3 mb-4">Commission Change</h1>

            <!-- Load Error Alert -->
            <div id="loadErrorAlert" class="alert alert-danger d-none" style="max-width: 600px;">
                <p class="mb-1" id="loadErrorMessage"></p>
                <p class="mb-0 small text-muted">You can still update the commission percentage below.</p>
            </div>

            <div style="max-width: 600px;">
                <div class="card">
                    <div class="card-header">
                        <h5 class="card-title mb-0 d-flex align-items-center gap-2">
                            <i class="bi bi-percent"></i> Update Commission Percentage
                        </h5>
                        <p class="text-muted small mb-0">Update the commission percentage (%) that AdminHub charges from
                            vendors</p>
                    </div>
                    <div class="card-body">
                        <form id="commissionForm">
                            <div class="mb-3">
                                <label for="currentCommission" class="form-label">
                                    Commission Percentage (%) <span class="text-danger">*</span>
                                </label>
                                <div class="d-flex align-items-center justify-content-around gap-2 my-4">
                                    <div class="d-flex flex-column gap-2">
                                        <span class="small fw-bold">Current Percentage</span>
                                        <input type="number" class="form-control" id="currentCommission" min="0"
                                            max="100" step="0.01" placeholder="Enter commission percentage (e.g., 10.5)"
                                            required disabled>
                                    </div>
                                    <i class="bi bi-arrow-left-right" style="margin-top: 24px;"></i>
                                    <div class="d-flex flex-column gap-2">
                                        <span class="small fw-bold">New Percentage</span>
                                        <input type="number" class="form-control" id="newCommission" min="0" max="100"
                                            step="0.01" placeholder="Enter commission percentage (e.g., 10.5)" required>
                                    </div>
                                </div>
                                <p class="text-muted small">Enter a value between 0 and 100 (e.g., 10 for 10%, 12.5 for
                                    12.5%)</p>
                            </div>

                            <!-- Error Alert -->
                            <div id="errorAlert" class="alert alert-danger d-none">
                                <p class="mb-0" id="errorMessage"></p>
                            </div>

                            <div class="d-flex align-items-center gap-3">
                                <button type="submit" class="btn btn-primary" id="submitBtn">Update Commission</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/mock-data.js"></script>
    <script src="js/api.js"></script>
    <script src="js/notifications.js"></script>
    <script src="js/app.js"></script>
    <script>
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orders - AdminHub</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="../public/favicon.svg">
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/guard.js"></script>
    <script src="js/layout.js"></script>
</head>

<body data-route="orders">
    <!-- Shared layout will inject sidebar and top navbar here -->
    <div id="layout-root"></div>

    <!-- Main Content -->
    <div id="main-content" class="main-content">
        <!-- Page Content -->
        <main class="page-container">
            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h5 class="card-title mb-0">All Orders</h5>
                </div>
                <div class="card-body">
                    <!-- Loading overlay -->
                    <div id="loadingOverlay" class="loading-overlay" style="display:none;">
                        <div class="spinner-border text-primary" role="status"></div>
                    </div>

                    <!-- Error alert -->
                    <div id="errorAlert" class="alert alert-danger" style="display:none;"></div>

                    <!-- Filter toolbar -->
                    <div class="row g-3 mb-4">
                        <div class="col-md-2">
                            <label class="form-label small text-muted">Status</label>
                            <select class="form-select" id="statusFilter">
                                <option value="">All Statuses</option>
                                <option value="pending">Pending</option>
                                <option value="processing">Processing</option>
                                <option value="shipped">Shipped</option>
                                <option value="delivered">Delivered</option>
                                <option value="cancelled">Cancelled</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label small text-muted">Customer Name</label>
                            <input type="text" class="form-control" id="customerNameFilter"
                                placeholder="Search customer...">
                        </div>
                        <div class="col-md-2">
                            <label class="form-label small text-muted">Order No</label>
                            <input type="text" class="form-control" id="orderNoFilter" placeholder="Search order...">
                        </div>
                        <div class="col-md-2">
                            <label class="form-label small text-muted">Start Date</label>
                            <input type="date" class="form-control" id="startDateFilter">
                        </div>
                        <div class="col-md-2">
                            <label class="form-label small text-muted">End Date</label>
                            <input type="date" class="form-control" id="endDateFilter">
                        </div>
                        <div class="col-md-2">
                            <label class="form-label small text-muted">Sort By</label>
                            <select class="form-select" id="sortByFilter">
                                <option value="recent">Recent First</option>
                                <option value="oldest">Oldest First</option>
                            </select>
                        </div>
                    </div>
                    <div class="d-flex gap-2 mb-3">
                        <button class="btn btn-primary" id="applyFiltersBtn">
                            <i class="bi bi-funnel"></i> Apply Filters
                        </button>
                        <button class="btn btn-outline-secondary" id="resetFiltersBtn">
                            <i class="bi bi-x-circle"></i> Reset
                        </button>
                        <button class="btn btn-outline-success ms-auto" id="exportBtn">
                            <i class="bi bi-download"></i> Export CSV
                        </button>
                    </div>

                    <!-- Orders table -->
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead>
                                <tr>
                                    <th>Order No</th>
                                    <th>Customer</th>
                                    <th>Items</th>
                                    <th>Total</th>
                                    <th>Status</th>
                                    <th>Date</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="ordersTableBody">
                                <!-- Orders rendered by JS -->
                            </tbody>
                        </table>
                    </div>

                    <!-- Pagination -->
                    <div id="paginationContainer" class="mt-4"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/mock-data.js"></script>
    <script src="js/api.js"></script>
    <script src="js/notifications.js"></script>
    <script src="js/app.js"></script>
    <script>
    </script>
</body>

</html>

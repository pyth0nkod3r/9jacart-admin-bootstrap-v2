<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buyer Sign ups - AdminHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/svg+xml" href="../public/favicon.svg">
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/guard.js"></script>
    <script src="js/layout.js"></script>
</head>

<body data-route="buyer-signups">
    <!-- Shared layout will inject sidebar and top navbar here -->
    <div id="layout-root"></div>

    <!-- Main Content -->
    <div id="main-content" class="main-content">
        <!-- Page Content -->
        <main class="page-container">
            <div class="d-flex align-items-center justify-content-between mb-4">
                <h1 class="h3 mb-0">Buyer Sign ups</h1>
                <div class="d-flex align-items-center gap-3">
                    <span class="text-muted small" id="totalSignups">0 buyer registrations</span>
                    <button class="btn btn-outline-primary" id="exportBtn">
                        <i class="bi bi-download"></i> Export CSV
                    </button>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h5 class="card-title mb-0">Buyer Registrations</h5>
                    <p class="text-muted small mb-0">All buyer accounts registered on the platform</p>
                </div>
                <div class="card-body">
                    <!-- Loading state -->
                    <div id="loadingState" class="text-center py-5">
                        <div class="spinner-border text-primary" role="status"></div>
                        <p class="mt-3 text-muted">Loading buyer signups...</p>
                    </div>

                    <!-- Error state -->
                    <div id="errorState" class="text-center py-5 d-none">
                        <i class="bi bi-exclamation-triangle text-danger display-4"></i>
                        <p class="mt-3 text-danger" id="errorMessage"></p>
                        <button class="btn btn-outline-primary" id="retryBtn">Try Again</button>
                    </div>

                    <!-- Empty state -->
                    <div id="emptyState" class="text-center py-5 d-none">
                        <i class="bi bi-inbox display-4 text-muted"></i>
                        <p class="mt-3 text-muted" id="emptyMessage">No buyer signups found</p>
                        <button class="btn btn-outline-primary" id="refreshBtn">Refresh</button>
                    </div>

                    <!-- Signups list -->
                    <div id="signupsList" class="d-none">
                        <!-- Search and filter toolbar -->
                        <div
                            class="mb-4 d-flex flex-column gap-3 flex-md-row align-items-md-center justify-content-md-between">
                            <div class="position-relative flex-1">
                                <i
                                    class="bi bi-search position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"></i>
                                <input type="text" class="form-control ps-5" id="searchInput"
                                    placeholder="Search by name, email, phone, or buyer ID...">
                            </div>
                            <div class="position-relative">
                                <button class="btn btn-outline-secondary d-flex align-items-center gap-2"
                                    id="filterBtn">
                                    <i class="bi bi-funnel"></i> Filters
                                    <span class="badge bg-primary rounded-pill px-2 py-0 small d-none"
                                        id="filterCountBadge">0</span>
                                </button>
                                <!-- Filter panel -->
                                <div id="filterPanel" class="position-absolute end-0 mt-2 p-4 rounded shadow d-none"
                                    style="width: 280px; background: var(--popover); border: 1px solid var(--border); z-index: 1000;">
                                    <div class="mb-3 fw-bold small">Filter by status</div>
                                    <div class="mb-3">
                                        <label class="d-flex align-items-center gap-2 cursor-pointer mb-2">
                                            <input type="checkbox" id="filterActive">
                                            <span>Active</span>
                                        </label>
                                        <label class="d-flex align-items-center gap-2 cursor-pointer">
                                            <input type="checkbox" id="filterInactive">
                                            <span>Inactive</span>
                                        </label>
                                    </div>
                                    <div class="d-flex align-items-center justify-content-between">
                                        <button class="btn btn-sm btn-link text-decoration-none"
                                            id="clearFiltersBtn">Clear</button>
                                        <button class="btn btn-sm btn-primary" id="doneFiltersBtn">Done</button>
                                    </div>
                                </div>
                            </div>
                            <p class="text-muted small mb-0 text-md-end" id="filteredCount">0 Buyers</p>
                        </div>

                        <div id="signupsContainer"></div>

                        <!-- Pagination -->
                        <div class="d-flex align-items-center justify-content-between mt-4 pt-3 border-top">
                            <span class="text-muted small" id="paginationInfo"></span>
                            <div class="btn-group" id="paginationControls"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/mock-data.js"></script>
    <script src="js/api.js"></script>
    <script src="js/notifications.js"></script>
    <script src="js/app.js"></script>
    <script>
    </script>
</body>

</html>

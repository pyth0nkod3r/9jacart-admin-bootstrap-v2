<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - AdminHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/svg+xml" href="../public/favicon.svg">
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/guard.js"></script>
    <script src="js/layout.js"></script>
</head>

<body data-route="overview">
    <!-- Sidebar + top navbar are injected by js/layout.js -->
    <nav id="sidebar" class="sidebar"></nav>

    <div id="main-content" class="main-content">
        <header class="top-navbar"></header>

        <main class="page-container">
            <div id="overviewRoot">
                <!-- LOADING -->
                <div class="state-loading">
                    <div class="row g-4 mb-4">
                        <div class="col-md-6 col-lg-3">
                            <div class="card placeholder-glow">
                                <div class="card-body"><span class="placeholder col-8"></span><span
                                        class="placeholder col-5 mt-2"></span></div>
                            </div>
                        </div>
                        <div class="col-md-6 col-lg-3">
                            <div class="card placeholder-glow">
                                <div class="card-body"><span class="placeholder col-8"></span><span
                                        class="placeholder col-5 mt-2"></span></div>
                            </div>
                        </div>
                        <div class="col-md-6 col-lg-3">
                            <div class="card placeholder-glow">
                                <div class="card-body"><span class="placeholder col-8"></span><span
                                        class="placeholder col-5 mt-2"></span></div>
                            </div>
                        </div>
                        <div class="col-md-6 col-lg-3">
                            <div class="card placeholder-glow">
                                <div class="card-body"><span class="placeholder col-8"></span><span
                                        class="placeholder col-5 mt-2"></span></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- ERROR -->
                <div class="state-error d-none">
                    <div class="alert alert-danger" role="alert">
                        <i class="bi bi-exclamation-octagon me-2"></i>
                        Failed to load overview data. Please refresh the page.
                    </div>
                </div>

                <!-- READY -->
                <div class="state-ready d-none">
                    <div class="row g-4 mb-4" id="overviewStats"></div>

                    <div id="pendingBanner" class="mb-4 d-none"></div>

                    <div class="row g-4">
                        <div class="col-md-6">
                            <div class="card h-100">
                                <div class="card-header">
                                    <h5 class="card-title mb-1">Recent Contacts</h5>
                                    <small class="text-muted">Latest contact form submissions</small>
                                </div>
                                <div class="card-body">
                                    <div id="recentContacts"></div>
                                    <a href="contacts.html"
                                        class="d-block text-center small text-primary text-decoration-none mt-3">View
                                        all contacts</a>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="card h-100">
                                <div class="card-header">
                                    <h5 class="card-title mb-1">Recent Waitlist</h5>
                                    <small class="text-muted">Latest vendor applications</small>
                                </div>
                                <div class="card-body">
                                    <div id="recentWaitlist"></div>
                                    <a href="waitlist.html"
                                        class="d-block text-center small text-primary text-decoration-none mt-3">View
                                        all waitlist entries</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/mock-data.js"></script>
    <script src="js/api.js"></script>
    <script src="js/notifications.js"></script>
    <script src="js/app.js"></script>
</body>

</html>

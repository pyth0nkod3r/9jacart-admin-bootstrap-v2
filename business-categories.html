<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Categories - AdminHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/svg+xml" href="../public/favicon.svg">
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/guard.js"></script>
    <script src="js/layout.js"></script>
</head>

<body data-route="business-categories">
    <!-- Shared layout will inject sidebar and top navbar here -->
    <div id="layout-root"></div>

    <!-- Main Content -->
    <div id="main-content" class="main-content">
        <!-- Page Content -->
        <main class="page-container">
            <div class="d-flex align-items-center justify-content-between mb-4">
                <h1 class="h3 mb-0">Business Categories</h1>
                <div class="d-flex align-items-center gap-3">
                    <span class="text-muted small" id="totalCategories">0 categories</span>
                    <a href="business-category-create.html" class="btn btn-primary" id="addCategoryBtn">
                        <i class="bi bi-plus-lg me-1"></i> Add Category
                    </a>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h5 class="card-title mb-0">Category Management</h5>
                    <p class="text-muted small mb-0">Manage business categories for vendor registration</p>
                </div>
                <div class="card-body">
                    <!-- Loading state -->
                    <div id="loadingState" class="text-center py-5">
                        <div class="spinner-border text-primary" role="status"></div>
                        <p class="mt-3 text-muted">Loading categories...</p>
                    </div>

                    <!-- Error state -->
                    <div id="errorState" class="text-center py-5 d-none">
                        <i class="bi bi-exclamation-triangle text-danger display-4"></i>
                        <p class="mt-3 text-danger" id="errorMessage"></p>
                        <button class="btn btn-outline-primary" id="retryBtn">Try Again</button>
                    </div>

                    <!-- Empty state -->
                    <div id="emptyState" class="text-center py-5 d-none">
                        <i class="bi bi-tag display-4 text-muted"></i>
                        <p class="mt-3 text-muted" id="emptyMessage">No business categories found</p>
                        <button class="btn btn-primary" id="emptyBtn">Create First Category</button>
                    </div>

                    <!-- Categories list -->
                    <div id="categoriesList" class="d-none">
                        <!-- Search -->
                        <div id="searchContainer" class="mb-4">
                            <div class="position-relative">
                                <i
                                    class="bi bi-search position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"></i>
                                <input type="text" class="form-control ps-5" id="searchInput"
                                    placeholder="Search categories by name or ID...">
                            </div>
                            <p class="text-muted small mt-2" id="searchResults"></p>
                        </div>

                        <div id="categoriesContainer" style="max-height: 60vh; overflow-y: auto;"></div>

                        <!-- Pagination -->
                        <div class="d-flex align-items-center justify-content-between mt-4 pt-3 border-top">
                            <span class="text-muted small" id="paginationInfo"></span>
                            <div class="btn-group" id="paginationControls"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Summary Stats -->
            <div class="card d-none" id="summaryCard">
                <div class="card-body p-4">
                    <div class="d-flex align-items-center justify-content-between">
                        <div>
                            <p class="text-muted small mb-0" id="summaryLabel">Total Categories</p>
                            <p class="h2 mb-0" id="summaryCount">0</p>
                        </div>
                        <i class="bi bi-tag text-muted" style="font-size: 2rem;"></i>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/mock-data.js"></script>
    <script src="js/api.js"></script>
    <script src="js/notifications.js"></script>
    <script src="js/app.js"></script>
    <script>
    </script>
</body>

</html>

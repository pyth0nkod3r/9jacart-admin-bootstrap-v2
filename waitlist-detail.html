<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendor Application - AdminHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/svg+xml" href="../public/favicon.svg">
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/guard.js"></script>
    <script src="js/layout.js"></script>
</head>

<body data-route="waitlist-detail">
    <div id="layout-root"></div>
    <div id="main-content" class="main-content">
        <main class="page-container">
            <div class="d-flex align-items-center gap-3 mb-4">
                <button class="btn btn-sm btn-outline-secondary" id="backBtn"><i class="bi bi-arrow-left me-1"></i> Back
                    to Waitlist</button>
                <h1 class="h3 mb-0">Vendor Application</h1>
            </div>
            <div id="loadingState" class="text-center py-5">
                <div class="spinner-border text-primary"></div>
                <p class="mt-3 text-muted">Loading...</p>
            </div>
            <div id="waitlistDetail" class="d-none">
                <div class="row g-4">
                    <div class="col-md-4">
                        <div class="card">
                            <div class="card-header">
                                <h5 class="card-title mb-0 d-flex align-items-center gap-2"><i
                                        class="bi bi-building"></i> Business Information</h5>
                            </div>
                            <div class="card-body">
                                <div class="mb-3"><label class="text-muted small">Business Name</label>
                                    <p class="mb-0 fw-bold" id="businessNameDisplay">--</p>
                                </div>
                                <div class="mb-3"><label class="text-muted small">Business Type</label>
                                    <p class="mb-0 fw-bold" id="businessTypeDisplay">--</p>
                                </div>
                                <div><label class="text-muted small">State of Operation</label>
                                    <div class="d-flex align-items-center gap-2"><i
                                            class="bi bi-geo-alt text-muted small"></i>
                                        <p class="mb-0 fw-bold" id="stateOfOperationDisplay">--</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card">
                            <div class="card-header">
                                <h5 class="card-title mb-0 d-flex align-items-center gap-2"><i class="bi bi-person"></i>
                                    Contact Information</h5>
                            </div>
                            <div class="card-body">
                                <div class="mb-3"><label class="text-muted small">Full Name</label>
                                    <p class="mb-0 fw-bold" id="fullNameDisplay">--</p>
                                </div>
                                <div class="mb-3"><label class="text-muted small">Email</label>
                                    <div class="d-flex align-items-center gap-2"><i
                                            class="bi bi-envelope text-muted small"></i><a href="#"
                                            class="text-primary fw-bold" id="emailDisplay">--</a></div>
                                </div>
                                <div><label class="text-muted small">Phone Number</label>
                                    <div class="d-flex align-items-center gap-2"><i
                                            class="bi bi-telephone text-muted small"></i><a href="#"
                                            class="text-primary fw-bold" id="phoneDisplay">--</a></div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card">
                            <div class="card-header">
                                <h5 class="card-title mb-0 d-flex align-items-center gap-2"><i
                                        class="bi bi-calendar"></i> Timeline</h5>
                            </div>
                            <div class="card-body">
                                <div class="mb-3"><label class="text-muted small">Applied</label>
                                    <p class="mb-0 fw-bold" id="appliedDateDisplay">--</p>
                                </div>
                                <div><label class="text-muted small">Last Updated</label>
                                    <p class="mb-0 fw-bold" id="updatedDateDisplay">--</p>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-8">
                        <div class="card">
                            <div class="card-header">
                                <h5 class="card-title mb-0 d-flex align-items-center gap-2"><i
                                        class="bi bi-box-seam"></i> Product Information</h5>
                            </div>
                            <div class="card-body">
                                <div class="mb-3"><label class="text-muted small">Product Categories</label>
                                    <div id="productCategoriesContainer" class="mt-2"></div>
                                </div>
                                <div class="mb-3"><label class="text-muted small">Product Origin</label>
                                    <p class="mb-0 fw-bold" id="productOriginDisplay">--</p>
                                </div>
                                <div><label class="text-muted small">Special Handling Required</label>
                                    <div class="d-flex align-items-center gap-2"><i
                                            class="bi bi-check-circle text-success" id="specialHandlingIcon"></i>
                                        <p class="mb-0 fw-bold" id="specialHandlingDisplay">--</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card">
                            <div class="card-header">
                                <h5 class="card-title mb-0 d-flex align-items-center gap-2"><i class="bi bi-globe"></i>
                                    Online Presence</h5>
                            </div>
                            <div class="card-body">
                                <div class="mb-3"><label class="text-muted small">Has Online Presence</label>
                                    <div class="d-flex align-items-center gap-2"><i
                                            class="bi bi-check-circle text-success" id="onlinePresenceIcon"></i>
                                        <p class="mb-0 fw-bold" id="onlinePresenceDisplay">--</p>
                                    </div>
                                </div>
                                <div class="mb-3"><label class="text-muted small">Online Platforms</label>
                                    <p class="mb-0 fw-bold" id="onlinePlatformsDisplay">--</p>
                                </div>
                                <div><label class="text-muted small">Receive Notifications</label>
                                    <div class="d-flex align-items-center gap-2"><i
                                            class="bi bi-check-circle text-success" id="receiveNotificationIcon"></i>
                                        <p class="mb-0 fw-bold" id="receiveNotificationDisplay">--</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-12" id="messageCard" style="display:none;">
                        <div class="card">
                            <div class="card-header">
                                <h5 class="card-title mb-0">Additional Message</h5>
                            </div>
                            <div class="card-body">
                                <p style="white-space: pre-wrap;" id="messageDisplay"></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/mock-data.js"></script>
    <script src="js/api.js"></script>
    <script src="js/notifications.js"></script>
    <script src="js/app.js"></script>
</body>

</html>

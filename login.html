<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AdminHub</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="../public/favicon.svg">
    <script src="js/config.js"></script>
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <div class="login-header">
                <h2>AdminHub</h2>
                <p>Sign in to your admin dashboard</p>
            </div>

            <div class="login-body">
                <form id="loginForm" novalidate>
                    <div class="mb-3">
                        <label for="loginEmail" class="form-label">Email</label>
                        <input
                            type="email"
                            id="loginEmail"
                            class="form-control"
                            placeholder="Enter your email"
                            autocomplete="email"
                            required
                        >
                    </div>

                    <div class="mb-3">
                        <label for="loginPassword" class="form-label">Password</label>
                        <div class="input-group">
                            <input
                                type="password"
                                id="loginPassword"
                                class="form-control"
                                placeholder="Enter your password"
                                autocomplete="current-password"
                                required
                            >
                            <span class="input-group-text" id="togglePasswordBtn" role="button" aria-label="Show password">
                                <i class="bi bi-eye" id="toggleIcon"></i>
                            </span>
                        </div>
                    </div>

                    <div id="loginError" class="text-danger small mb-3" role="alert" hidden></div>

                    <button type="submit" class="btn btn-login" id="loginSubmit">
                        Sign in
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Auth (must run before app.js so initLogin() can use window.auth) -->
    <script src="js/auth.js"></script>
    <!-- Custom JS -->
    <script src="js/app.js"></script>
</body>
</html>
